<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Report Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="settings.css">
</head>

<body>
    <div class="container">

        <!-- Top bar -->
        <header class="topbar">
            <div class="brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M12 2 3 6v6c0 5 3.8 8.6 9 10 5.2-1.4 9-5 9-10V6z" />
                        <path d="m9 12 2 2 4-4" />
                    </svg>
                </div>
                <div class="brand-text">
                    <h1>Daily Report Generator</h1>
                    <p>Generate Daily DLP Reports for Scout Motors</p>
                </div>
            </div>

            <div class="layout-toggle" role="group" aria-label="Layout">
                <button id="layoutSplitBtn" class="layout-btn" type="button" aria-pressed="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="3" y="4" width="7" height="16" rx="1.5" />
                        <rect x="14" y="4" width="7" height="16" rx="1.5" />
                    </svg>
                    Split
                </button>
                <button id="layoutStackedBtn" class="layout-btn" type="button" aria-pressed="false">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="4" y="3" width="16" height="7" rx="1.5" />
                        <rect x="4" y="14" width="16" height="7" rx="1.5" />
                    </svg>
                    Stacked
                </button>
            </div>

            <button id="settingsBtn" class="settings-btn" type="button" aria-haspopup="dialog">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
                Settings
            </button>
        </header>

        <!-- Progress -->
        <div class="progress-strip">
            <div class="step-item" id="progressUpload">
                <span class="dot">1</span>
                <span class="step-label">Upload files</span>
            </div>
            <div class="step-item" id="progressGenerate">
                <span class="dot">2</span>
                <span class="step-label">Generate report</span>
            </div>
            <div class="step-item" id="progressCopy">
                <span class="dot">3</span>
                <span class="step-label">Copy to Outlook</span>
            </div>
        </div>

        <!-- Workspace -->
        <div class="workspace">

            <!-- Upload / controls panel -->
            <section class="panel upload-panel">
                <h2>Upload files</h2>

                <div class="file-list">

                    <!-- Cyera -->
                    <div class="file-row">
                        <label class="file-drop">
                            <input id="cyeraFile" type="file" accept=".csv">
                            <span class="file-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                    <path d="M14 2v6h6" />
                                    <path d="M9 15h6M9 11h3" />
                                </svg>
                            </span>
                            <span class="file-text">
                                <span class="file-title">Cyera CSV <span class="required">*</span></span>
                                <small id="cyeraStatus">Waiting for CSV...</small>
                            </span>
                        </label>
                        <button id="removeCyera" class="icon-btn" aria-label="Remove Cyera CSV">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6" />
                            </svg>
                        </button>
                    </div>

                    <!-- Purview -->
                    <div class="file-row">
                        <label class="file-drop">
                            <input id="purviewFile" type="file" accept=".csv">
                            <span class="file-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                    <path d="M14 2v6h6" />
                                    <path d="M9 15h6M9 11h3" />
                                </svg>
                            </span>
                            <span class="file-text">
                                <span class="file-title">Purview CSV <span class="required">*</span></span>
                                <small id="purviewStatus">Waiting for CSV...</small>
                            </span>
                        </label>
                        <button id="removePurview" class="icon-btn" aria-label="Remove Purview CSV">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6" />
                            </svg>
                        </button>
                    </div>

                    <!-- Wiz -->
                    <div class="file-row">
                        <label class="file-drop">
                            <input id="wizImage" type="file" accept="image/*">
                            <span class="file-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="3" width="18" height="18" rx="2" />
                                    <circle cx="9" cy="9" r="2" />
                                    <path d="m21 15-5-5L5 21" />
                                </svg>
                            </span>
                            <span class="file-text">
                                <span class="file-title">Wiz screenshot <span class="optional">Optional</span></span>
                                <small id="wizStatus">No screenshot</small>
                            </span>
                        </label>
                        <button id="removeWiz" class="icon-btn" aria-label="Remove Wiz screenshot">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6" />
                            </svg>
                        </button>
                    </div>

                </div>

                <div class="input-group">
                    <label for="sharepointLink">SharePoint link (optional)</label>
                    <input id="sharepointLink" type="text" placeholder="Paste SharePoint link">
                </div>

                <button id="generateBtn" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M13 2 3 14h9l-1 8 10-12h-9z" />
                    </svg>
                    Generate report
                </button>
            </section>

            <!-- Preview panel -->
            <section class="panel preview-panel">
                <div class="preview-header">
                    <h2>Report preview</h2>
                    <div class="preview-actions">
                        <button id="copyBtn" disabled>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <rect x="8" y="8" width="12" height="12" rx="2" />
                                <path d="M4 16V4a2 2 0 0 1 2-2h10" />
                            </svg>
                            Send Via Outlook
                        </button>
                        <button id="excelBtn" disabled>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" />
                                <path d="M3 9h18M9 21V9" />
                            </svg>
                            Generate Excel
                        </button>
                    </div>
                </div>

                <div id="preview"></div>

                <div class="placeholder" id="previewPlaceholder">
                    <div class="placeholder-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="4" y="3" width="16" height="18" rx="2" />
                            <path d="M9 3v3h6V3M9 12h6M9 16h4" />
                        </svg>
                    </div>
                    <h3>No report yet</h3>
                    <p>Add the Cyera and Purview CSVs, then select <strong>Generate report</strong>.</p>
                </div>
            </section>
            <div id="toast" class="toast">

                <div class="toast-icon">✅</div>

                <div class="toast-content">

                    <div class="toast-title"></div>

                    <div class="toast-message"></div>

                </div>

            </div>

        </div>
    </div>
<!-- ==============================
Settings Panel
=============================== -->

<div id="settingsOverlay" class="settings-overlay">

    <div id="settingsPanel" class="settings-panel">

        <div class="settings-header">

            <h2>⚙ Settings</h2>

            <button id="closeSettings">&times;</button>

        </div>

        <div class="settings-body">

            <h3>Email Configuration</h3>

            <label>To</label>

<div id="toContainer" class="chip-container">

    <input
        id="toInput"
        type="email"
        placeholder="Add recipient and press Enter">

</div>

           <label>CC</label>

<div id="ccContainer" class="chip-container">

    <input
        id="ccInput"
        type="email"
        placeholder="Add recipient and press Enter">

</div>


        <div class="settings-footer">

    <span id="settingsSaved">

        ✔ All changes saved

    </span>

</div>

    </div>

</div>

    <script src="js/layoutToggle.js"></script>
   
    <script src="libs/papaparse.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/validator.js"></script>
    <script src="js/pivot.js"></script>
    <script src="js/report.js"></script>
    <script src="libs/docx.js"></script>
    <script src="libs/exceljs.min.js"></script>
    <script src="js/excelGenerator.js"></script>
    <script src="js/wordGenerator.js"></script>
    <script src="js/app.js"></script>
     <script src="js/settings.js"></script>
</body>

</html>
