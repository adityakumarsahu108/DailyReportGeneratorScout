<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Report Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <header>
            <div class="title-section">
                <span class="eyebrow">Data Loss Prevention</span>
                <h1>Daily Report Generator</h1>
                <p>Generate Daily DLP Reports for Scout Motors</p>
            </div>

            <div class="progress-section">
                <div class="progress-item" id="progressUpload">
                    <span class="dot">1</span>
                    Upload Files
                </div>
                <div class="progress-item" id="progressGenerate">
                    <span class="dot">2</span>
                    Generate Report
                </div>
                <div class="progress-item" id="progressCopy">
                    <span class="dot">3</span>
                    Copy to Outlook
                </div>
            </div>
        </header>

        <!-- Upload Card -->
        <section class="card">
            <h2>Upload Files</h2>

            <div class="upload-grid">
                <!-- Cyera -->
                <div class="upload-card">
                    <h3>Cyera CSV <span class="required">*</span></h3>
                    <label class="upload-box">
                        <input id="cyeraFile" type="file" accept=".csv">
                        <div class="upload-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <path d="M14 2v6h6"/>
                                <path d="M9 15h6M9 11h3"/>
                            </svg>
                        </div>
                        <span>Click to Upload</span>
                        <small id="cyeraStatus">Waiting for CSV...</small>
                    </label>
                    <button id="removeCyera" class="secondary-btn">Remove</button>
                </div>

                <!-- Purview -->
                <div class="upload-card">
                    <h3>Purview CSV <span class="required">*</span></h3>
                    <label class="upload-box">
                        <input id="purviewFile" type="file" accept=".csv">
                        <div class="upload-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <path d="M14 2v6h6"/>
                                <path d="M9 15h6M9 11h3"/>
                            </svg>
                        </div>
                        <span>Click to Upload</span>
                        <small id="purviewStatus">Waiting for CSV...</small>
                    </label>
                    <button id="removePurview" class="secondary-btn">Remove</button>
                </div>

                <!-- Wiz -->
                <div class="upload-card">
                    <h3>Wiz Screenshot</h3>
                    <label class="upload-box">
                        <input id="wizImage" type="file" accept="image/*">
                        <div class="upload-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2"/>
                                <circle cx="9" cy="9" r="2"/>
                                <path d="m21 15-5-5L5 21"/>
                            </svg>
                        </div>
                        <span>Optional</span>
                        <small id="wizStatus">No Screenshot</small>
                    </label>
                    <button id="removeWiz" class="secondary-btn">Remove</button>
                </div>
            </div>

            <!-- SharePoint -->
            <div class="input-group">
                <label>SharePoint Link (Optional)</label>
                <input id="sharepointLink" type="text" placeholder="Paste SharePoint Link">
            </div>

            <!-- Generate -->
            <button id="generateBtn" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 2 3 14h9l-1 8 10-12h-9z"/>
                </svg>
                Generate Report
            </button>
        </section>

        <!-- Preview -->
        <section class="card">
            <div class="preview-header">
                <h2>Report Preview</h2>
                <div class="preview-actions">
                    <button id="copyBtn" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="8" y="8" width="12" height="12" rx="2"/>
                            <path d="M4 16V4a2 2 0 0 1 2-2h10"/>
                        </svg>
                        Copy for Outlook
                    </button>
                    <button id="excelBtn" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <path d="M3 9h18M9 21V9"/>
                        </svg>
                        Generate SharePoint Excel
                    </button>
                </div>
            </div>

            <div id="preview"></div>

            <div class="placeholder" id="previewPlaceholder">
                <div class="placeholder-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="4" y="3" width="16" height="18" rx="2"/>
                        <path d="M9 3v3h6V3M9 12h6M9 16h4"/>
                    </svg>
                </div>
                <h3>No Report Generated</h3>
                <p>Upload the required CSV files and click <strong>Generate Report</strong>.</p>
            </div>
        </section>

    </div>

    <script src="libs/papaparse.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/validator.js"></script>
    <script src="js/pivot.js"></script>
    <script src="js/report.js"></script>
    <script src="libs/docx.js"></script>
    <script src="libs/exceljs.min.js"></script>
    <script src="js/excelGenerator.js"></script>
    <script src="js/wordGenerator.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
