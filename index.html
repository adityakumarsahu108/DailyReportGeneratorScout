<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Daily Report Generator</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <header>

            <div class="title-section">

                <h1>📊 Daily Report Generator</h1>

                <p>
                    Generate Daily DLP Reports for Scout Motors
                </p>

            </div>

            <div class="progress-section">

                <div class="progress-item" id="progressUpload">

                    <span class="dot"></span>

                    Upload Files

                </div>

                <div class="progress-item" id="progressGenerate">

                    <span class="dot"></span>

                    Generate Report

                </div>

                <div class="progress-item" id="progressCopy">

                    <span class="dot"></span>

                    Copy to Outlook

                </div>

            </div>

        </header>

        <!-- Upload Card -->

        <section class="card">

            <h2>Upload Files</h2>

            <div class="upload-grid">

                <!-- Cyera -->

                <div class="upload-card">

                    <h3>Cyera CSV <span class="required">*</span></h3>

                    <label class="upload-box">

                        <input id="cyeraFile" type="file" accept=".csv">

                        <div class="upload-icon">

                            📄

                        </div>

                        <span>

                            Click to Upload

                        </span>

                        <small id="cyeraStatus">

                            Waiting for CSV...

                        </small>

                    </label>

                    <button id="removeCyera" class="secondary-btn">

                        Remove

                    </button>

                </div>

                <!-- Purview -->

                <div class="upload-card">

                    <h3>Purview CSV <span class="required">*</span></h3>

                    <label class="upload-box">

                        <input id="purviewFile" type="file" accept=".csv">

                        <div class="upload-icon">

                            📄

                        </div>

                        <span>

                            Click to Upload

                        </span>

                        <small id="purviewStatus">

                            Waiting for CSV...

                        </small>

                    </label>

                    <button id="removePurview" class="secondary-btn">

                        Remove

                    </button>

                </div>

                <!-- Wiz -->

                <div class="upload-card">

                    <h3>Wiz Screenshot</h3>

                    <label class="upload-box">

                        <input id="wizImage" type="file" accept="image/*">

                        <div class="upload-icon">

                            🖼️

                        </div>

                        <span>

                            Optional

                        </span>

                        <small id="wizStatus">

                            No Screenshot

                        </small>

                    </label>

                    <button id="removeWiz" class="secondary-btn">

                        Remove

                    </button>

                </div>

            </div>

            <!-- SharePoint -->

            <div class="input-group">

                <label>

                    SharePoint Link (Optional)

                </label>

                <input id="sharepointLink" type="text" placeholder="Paste SharePoint Link">

            </div>

            <!-- Generate -->

            <button id="generateBtn" disabled>

                Generate Report

            </button>

        </section>

        <!-- Preview -->

        <section class="card">

            <div class="preview-header">

                <h2>

                    Report Preview

                </h2>

                <button id="copyBtn" disabled>

                   📋 Copy for Outlook

                </button>

            </div>

            <div id="preview">

            </div>
            <div class="placeholder">

                <div class="placeholder-icon">

                    📋

                </div>

                <h3>

                    No Report Generated

                </h3>

                <p>

                    Upload the required CSV files and click
                    <strong>Generate Report</strong>.

                </p>

            </div>

    </div>

    </section>

    </div>

    <script src="js/utils.js"></script>

    <script src="js/validator.js"></script>

    <script src="js/pivot.js"></script>

    <script src="js/report.js"></script>

    <script src="libs/docx.js"></script>

    <script src="js/wordGenerator.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
